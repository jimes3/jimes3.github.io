/span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np<br><span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt<br><span class="hljs-keyword">import</span> warnings<br>warnings.filterwarnings(<span class="hljs-string">&quot;ignore&quot;</span>)<br>plt.rcParams[<span class="hljs-string">&#x27;axes.unicode_minus&#x27;</span>] = <span class="hljs-literal">False</span> <span class="hljs-comment">#显示负号</span><br>plt.rcParams[<span class="hljs-string">&#x27;font.family&#x27;</span>] = [<span class="hljs-string">&#x27;sans-serif&#x27;</span>]<br>plt.rcParams[<span class="hljs-string">&#x27;font.sans-serif&#x27;</span>] = [<span class="hljs-string">&#x27;SimHei&#x27;</span>]  <span class="hljs-comment"># 散点图标签可以显示中文</span><br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">Objective_function</span>(<span class="hljs-params">X</span>):  <span class="hljs-comment"># 目标函数和约束条件    最小化</span><br>    X = X.flatten() <span class="hljs-comment">#将X变为一维数组</span><br>    x1 = X[<span class="hljs-number">0</span>]<br>    x2 = X[<span class="hljs-number">1</span>]<br>    x3 = X[<span class="hljs-number">2</span>]<br>    p1 = (<span class="hljs-built_in">max</span>(<span class="hljs-number">0</span>, <span class="hljs-number">6</span> * x1 + <span class="hljs-number">5</span> * x2 - <span class="hljs-number">60</span>)) ** <span class="hljs-number">2</span>     <span class="hljs-comment">#表达的含义是函数表达式小于0</span><br>    p2 = (<span class="hljs-built_in">max</span>(<span class="hljs-number">0</span>, <span class="hljs-number">10</span> * x1 + <span class="hljs-number">20</span> * x2 - <span class="hljs-number">150</span>)) ** <span class="hljs-number">2</span><br>    <span class="hljs-comment">#如果是等式约束，可以转化成表达式=0，然后目标函数-10000*表达式</span><br>    fx = <span class="hljs-number">100.0</span> * (x2 - x1) ** <span class="hljs-number">2.0</span> + (<span class="hljs-number">1</span> - x1) ** <span class="hljs-number">2.0</span> * x3<br>    <span class="hljs-keyword">return</span> fx + <span class="hljs-number">10000</span> * (p1 + p2)     <span class="hljs-comment">#施加惩罚项</span><br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">main_work</span>():<br>    <span class="hljs-comment"># ( 粒子个数, 最大迭代次数,x_min,x_max, max_vel, 阈值, C1=2, C2=2, W=1)   范围都是左闭右开</span><br>    pso = PSO(<span class="hljs-number">10</span>, <span class="hljs-number">10000</span>,[[-<span class="hljs-number">30</span>,-<span class="hljs-number">30</span>],[-<span class="hljs-number">1</span>],[]],[[<span class="hljs-number">30</span>,<span class="hljs-number">30</span>],[<span class="hljs-number">1</span>],[]], <span class="hljs-number">30</span>, -<span class="hljs-number">1000</span>, C1=<span class="hljs-number">1</span>, C2=<span class="hljs-number">2</span>, W=<span class="hljs-number">1</span>)<br>    fit_var_list, best_pos = pso.update_ndim()<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;最优位置:&quot;</span> + <span class="hljs-built_in">str</span>(best_pos))<br>    <span class="hljs-built_in">print</span>(<span class="hljs-string">f&quot;最优解为：<span class="hljs-subst">&#123;fit_var_list[-<span class="hljs-number">1</span>]:<span class="hljs-number">.9</span>f&#125;</span>&quot;</span>)<br>    plt.title(<span class="hljs-string">&#x27;粒子群&#x27;</span>)<br>    plt.plot([i <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>,<span class="hljs-built_in">len</span>(fit_var_list)+<span class="hljs-number">1</span>)],fit_var_list, color=<span class="hljs-string">&#x27;r&#x27;</span>)<br>    plt.show()<br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">particle</span>:<br>    <span class="hljs-comment"># 初始化</span><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self, x_min, x_max, max_vel, dim</span>):<br>        pos = np.zeros((dim))<br>        self.l1 = <span class="hljs-built_in">len</span>(x_min[<span class="hljs-number">0</span>])<br>        self.l2 = <span class="hljs-built_in">len</span>(x_min[<span class="hljs-number">0</span>]+x_min[<span class="hljs-number">1</span>])<br>        <span class="hljs-keyword">for</span> v <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(dim):           <span class="hljs-comment">#生成初始解</span><br>            <span class="hljs-keyword">if</span> v &lt; self.l1:<br>                pos[v] = np.random.uniform(x_min[<span class="hljs-number">0</span>][v], x_max[<span class="hljs-number">0</span>][v])     <span class="hljs-comment">#有理数</span><br>            <span class="hljs-keyword">elif</span> v &gt;= self.l1 <span class="hljs-keyword">and</span> v &lt; self.l2:<br>                pos[v] = np.random.randint(x_min[<span class="hljs-number">1</span>][v-self.l1], x_max[<span class="hljs-number">1</span>][v-self.l1]+<span class="hljs-number">1</span>)   <span class="hljs-comment">#整数</span><br>            <span class="hljs-keyword">else</span>:<br>                pos[v] = np.random.randint(<span class="hljs-number">0</span>,<span class="hljs-number">2</span>)    <span class="hljs-comment">#0-1变量</span><br>        self.__pos = np.array(pos)  <span class="hljs-comment"># 粒子的位置</span><br>        self.__vel = np.random.uniform(-max_vel, max_vel, (<span class="hljs-number">1</span>, dim))  <span class="hljs-comment"># 粒子的速度</span><br>        self.__bestPos = np.zeros((<span class="hljs-number">1</span>, dim))  <span class="hljs-comment"># 粒子最好的位置</span><br>        self.__fitnessValue = Objective_function(self.__pos)  <span class="hljs-comment"># 适应度函数值</span><br><span class="hljs-comment">#__开头的为私有属性，只在类内存在</span><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">set_pos</span>(<span class="hljs-params">self, value</span>):<br>        pos = np.array(value).ravel()<br>        self.__pos = pos<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_pos</span>(<span class="hljs-params">self</span>):<br>        <span class="hljs-keyword">return</span> self.__pos<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">set_best_pos</span>(<span class="hljs-params">self, value</span>):<br>        self.__bestPos = value<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_best_pos</span>(<span class="hljs-params">self</span>):<br>        <span class="hljs-keyword">return</span> self.__bestPos<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">set_vel</span>(<span class="hljs-params">self, value</span>):<br>        self.__vel = value<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_vel</span>(<span class="hljs-params">self</span>):<br>        <span class="hljs-keyword">return</span> self.__vel<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">set_fitness_value</span>(<span class="hljs-params">self, value</span>):<br>        self.__fitnessValue = value<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">get_fitness_value</span>(<span class="hljs-params">self</span>):<br>        <span class="hljs-keyword">return</span> self.__fitnessValue<br><br><span class="hljs-keyword">class</span> <span class="hljs-title class_">PSO</span>:<br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">__init__</span>(<span class="hljs-params">self,  size, iter_num, x_min,x_max, max_vel, tol, best_fitness_value=<span class="hljs-built_in">float</span>(<span class="hljs-params"><span class="hljs-string">&#x27;Inf&#x27;</span></span>), C1=<span class="hljs-number">2</span>, C2=<span class="hljs-number">2</span>, W=<span class="hljs-number">1</span></span>):<br>        self.C1 = C1      <span class="hljs-comment">#加速常数1，控制局部最优解</span><br>        self.C2 = C2      <span class="hljs-comment">#加速常数2，控制全局最优解</span><br>        self.W = W        <span class="hljs-comment">#惯性因子</span><br>        self.dim = <span class="hljs-built_in">len</span>(np.array(x_min).ravel())  <span class="hljs-comment"># 粒子的维度，变量个数</span><br>        self.size = size  <span class="hljs-comment"># 粒子个数</span><br>        self.iter_num = iter_num  <span class="hljs-comment"># 迭代次数</span><br>        self.x_min = x_min    <span class="hljs-comment">#x 的下限</span><br>        self.x_max = x_max     <span class="hljs-comment"># x 的上限</span><br>        self.max_vel = max_vel  <span class="hljs-comment"># 粒子最大速度</span><br>        self.tol = tol  <span class="hljs-comment"># 截止条件</span><br>        self.l1 = <span class="hljs-built_in">len</span>(x_min[<span class="hljs-number">0</span>])<br>        self.l2 = <span class="hljs-built_in">len</span>(x_min[<span class="hljs-number">0</span>]+x_min[<span class="hljs-number">1</span>])<br>        self.best_fitness_value = best_fitness_value<br>        self.best_position = np.zeros((<span class="hljs-number">1</span>, se
