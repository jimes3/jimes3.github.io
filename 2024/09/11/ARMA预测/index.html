ont icon-clock-fill"></i> 8 分钟</span></div></div></div></div></div></div></header><main><div class="container-fluid nopadding-x"><div class="row nomargin-x"><div class="side-col d-none d-lg-block col-lg-2"></div><div class="col-lg-8 nopadding-x-md"><div class="container nopadding-x-md" id="board-ctn"><div id="board"><article class="post-content mx-auto"><h1 id="seo-header">ARMA预测代码</h1><div class="markdown-body"><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br></pre></td><td class="code"><pre><code class="hljs python"><span class="hljs-keyword">from</span> math <span class="hljs-keyword">import</span> log<br><span class="hljs-keyword">import</span> numpy <span class="hljs-keyword">as</span> np<br><span class="hljs-keyword">import</span> pandas <span class="hljs-keyword">as</span> pd<br><span class="hljs-keyword">import</span> matplotlib.pyplot <span class="hljs-keyword">as</span> plt<br><span class="hljs-keyword">from</span> sklearn.metrics <span class="hljs-keyword">import</span> mean_squared_error<br>np.set_printoptions(threshold=np.inf) <span class="hljs-comment"># threshold 指定超过多少使用省略号，np.inf代表无限大</span><br>np.set_printoptions(suppress=<span class="hljs-literal">True</span>) <span class="hljs-comment">#不以科学计数法输出</span><br><span class="hljs-keyword">import</span> warnings<br>warnings.filterwarnings(<span class="hljs-string">&quot;ignore&quot;</span>)<br>plt.rcParams[<span class="hljs-string">&#x27;axes.unicode_minus&#x27;</span>] = <span class="hljs-literal">False</span> <span class="hljs-comment">#显示负号</span><br>plt.rcParams[<span class="hljs-string">&#x27;font.family&#x27;</span>] = [<span class="hljs-string">&#x27;sans-serif&#x27;</span>]<br>plt.rcParams[<span class="hljs-string">&#x27;font.sans-serif&#x27;</span>] = [<span class="hljs-string">&#x27;SimHei&#x27;</span>]  <span class="hljs-comment"># 散点图标签可以显示中文</span><br><br>data = pd.read_csv(<span class="hljs-string">&#x27;时间序列预测数据集.csv&#x27;</span>,parse_dates=[<span class="hljs-string">&#x27;Date&#x27;</span>])<br>data.set_index(<span class="hljs-string">&#x27;Date&#x27;</span>,inplace=<span class="hljs-literal">True</span>)     <span class="hljs-comment">#将时间设置为行索引</span><br><br><span class="hljs-comment">#####################################    信息准则    ###########################################</span><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">information</span>(<span class="hljs-params">df,df0,p</span>):<br>    n = <span class="hljs-built_in">len</span>(df)<br>    mse = mean_squared_error(df,df0)<br>    <span class="hljs-comment">#aic = n * log(mse) + 2 * p</span><br>    aicc = log(mse) + (n+p)/(n-p-<span class="hljs-number">2</span>)<br>    bic = n * log(mse) + p * log(n)<br>    <span class="hljs-keyword">return</span> aicc,bic<br><span class="hljs-keyword">def</span> <span class="hljs-title function_">AR_prediction</span>(<span class="hljs-params">x, p, predict_x_n = <span class="hljs-number">0</span></span>):<br>    df = np.array(x).ravel()     <span class="hljs-comment">#将数据转化为numpy格式，并将其转化为一维列表</span><br>    df0 = df.copy()         <span class="hljs-comment">#准备一个副本，为了存储预测的数据</span><br>    Y = df[p:].copy()<br>    h = <span class="hljs-built_in">len</span>(df0)-p<br>    X = np.zeros((h,p+<span class="hljs-number">1</span>))<br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(h):            <span class="hljs-comment">#得到X矩阵</span><br>        X[i][<span class="hljs-number">0</span>] = <span class="hljs-number">1</span><br>        <span class="hljs-keyword">for</span> v <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>,p+<span class="hljs-number">1</span>):<br>            X[i,-v] = df[i+v-<span class="hljs-number">1</span>]<br>    sigma = np.linalg.inv(X.T.dot(X)).dot(X.T).dot(Y.T)          <span class="hljs-comment">#最小二乘法估计参数值</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(h):<br>        df0[p+i] = <span class="hljs-built_in">sum</span>(sigma * X[i])      <span class="hljs-comment">#得到所有预测的估计值</span><br>    df00 = df.copy()<br>    df1 = np.zeros(predict_x_n)<br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(predict_x_n):<br>        df1[i] = <span class="hljs-built_in">sum</span>(np.multiply(sigma , df00[-p:][::-<span class="hljs-number">1</span>]))        <span class="hljs-comment">#得到所有预测值</span><br>        df00 = np.append(df00,df1[i])<br>    <span class="hljs-keyword">return</span> df0,df1<br><br><span class="hljs-comment">#########################################   阶数确定   ##############################################</span><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">p_finally</span>(<span class="hljs-params">n</span>):<br>    jieguo = []<br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>,n):<br>        df0,df1 = AR_prediction(data,i)<br>        aicc,bic = information(data,df0,i)<br>        jieguo.append([i,aicc,bic])<br>    jieguo_aicc = <span class="hljs-built_in">sorted</span>(jieguo,reverse=<span class="hljs-literal">False</span>, key=<span class="hljs-keyword">lambda</span> x: x[<span class="hljs-number">1</span>])  <span class="hljs-comment">#以aicc排序</span><br>    jieguo_bic = <span class="hljs-built_in">sorted</span>(jieguo,reverse=<span class="hljs-literal">False</span>, key=<span class="hljs-keyword">lambda</span> x: x[<span class="hljs-number">2</span>])  <span class="hljs-comment">#以bic排序</span><br>    <span class="hljs-keyword">return</span> jieguo_aicc[<span class="hljs-number">0</span>][<span class="hljs-number">0</span>],jieguo_bic[<span class="hljs-number">0</span>][<span class="hljs-number">0</span>]<br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">sma</span>(<span class="hljs-params">x</span>):<br>    <span class="hljs-keyword">return</span> np.mean(x)        <span class="hljs-comment">#简单移动平均</span><br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">wma</span>(<span class="hljs-params">x</span>):<br>    x = np.array(x).ravel()<br>    w = np.arange(<span class="hljs-number">1</span>,<span class="hljs-built_in">len</span>(x)+<span class="hljs-number">1</span>)      <span class="hljs-comment">#生成等差数列</span><br>    <span class="hljs-keyword">return</span> np.<span class="hljs-built_in">sum</span>(x*w)/(<span class="hljs-built_in">len</span>(x)*(<span class="hljs-built_in">len</span>(x)+<span class="hljs-number">1</span>)/<span class="hljs-number">2</span>)       <span class="hljs-comment">#加权移动平均（等距）</span><br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">ema</span>(<span class="hljs-params">x,i</span>):<br>    x = np.array(x).ravel()<br>    <span class="hljs-keyword">if</span> i &lt; <span class="hljs-number">1</span> <span class="hljs-keyword">and</span> i &gt; <span class="hljs-number">0</span>:<br>        l = <span class="hljs-built_in">len</span>(x)<br>        w = np.logspace(l, <span class="hljs-number">0</span>, num=l, base=(<span class="hljs-number">1</span>-i))      <span class="hljs-comment">#生成等比数列</span><br>    <span class="hljs-keyword">else</span>:<br>        <span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;平滑因子范围错误&#x27;</span>)<br>    <span class="hljs-keyword">return</span> np.<span class="hljs-built_in">sum</span>(x*w)/np.<span class="hljs-built_in">sum</span>(w)         <span class="hljs-comment">#指数移动平均</span><br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">MA_prediction</span>(<span class="hljs-params">data, q, predict_x_n=<span class="hljs-number">0</span></span>):<br>    <span class="hljs-comment">##########################   移动平均预测    ################################</span><br>    df = np.array(data).ravel()     <span class="hljs-comment">#将数据转化为numpy格式，并将其转化为一维列表</span><br>    df0 = df.copy()         <span class="hljs-comment">#准备一个副本，存储真实值以及预测值</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-built_in">len</span>(data)-q+<span class="hljs-number">1</span>):<br>        df[q+i-<span class="hljs-number">1</span>] = ema(data[i:i+q],<span class="hljs-number">0.5</span>)         <span class="hljs-comment">#获得简单移动平均获得的预测数列</span><br><br>    df_wu = df0 - df        <span class="hljs-comment">#获得误差项</span><br><br>    df1 = np.zeros(predict_x_n)      <span class="hljs-comment">#存储预测值</span><br>    <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(predict_x_n):<br>        df1[i] = ema(df0[-q:],<span class="hljs-number">0.5</span>)        <span class="hljs-comment">#得到所有预测值</span><br>        df0 = np.append(df0,df1[i])<br>    <span class="hljs-comment">##############################   误差项预测   ###############################</span><br>    <span class="hljs-keyword">def</span> <span class="hljs-title function_">MA_AR_prediction</span>(<span class="hljs-params">x, p, predict_x_n = <span class="hljs-number">0</span></span>):           <span class="hljs-comment">#误差项预测实际就为AR预测，这也是为什么MA模型阶数为0时就转化成AR模型的原因</span><br>        df = np.array(x[p:]).ravel()     <span class="hljs-comment">#将数据转化为numpy格式，并将其转化为一维列表</span><br>        df0 = df.copy()         <span class="hljs-comment">#准备一个副本，为了存储预测的数据</span><br>        Y = df[p:].copy()<br>        h = <span class="hljs-built_in">len</span>(df0)-p<br>        X = np.zeros((h,p+<span class="hljs-number">1</span>))<br>        <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(h):            <span class="hljs-comment">#得到X矩阵</span><br>            X[i][<span class="hljs-number">0</span>] = <span class="hljs-number">1</span><br>            <span class="hljs-keyword">for</span> v <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">1</span>,p+<span class="hljs-number">1</span>):<br>                X[i,-v] = df[i+v-<span class="hljs-number">1</span>]<br>        sigma = np.linalg.inv(X.T.dot(X)).dot(X.T).dot(Y.T)          <span class="hljs-comment">#最小二乘法估计参数值</span><br>        <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(h):<br>            df0[p+i] = <span class="hljs-built_in">sum</span>(sigma * X[i])        <span class="hljs-comment">#得到所有预测的估计值</span><br>        df00 = df.copy()<br>        df1 = np.zeros(predict_x_n)<br>        <span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(predict_x_n):<br>            df1[i] = <span class="hljs-built_in">sum</span>(np.multiply(sigma , df00[-p:][::-<span class="hljs-number">1</span>]))        <span class="hljs-comment">#得到所有预测值</span><br>            df00 = np.append(df00,df1[i])<br>        <span class="hljs-keyword">return</span> df0,df1<br>    wucha,wucha_predict = MA_AR_prediction(df_wu,q,predict_x_n)<br>    <span class="hljs-keyword">return</span> wucha,wucha_predict<br><br><span class="hljs-keyword">def</span> <span class="hljs-title function_">ARMA</span>(<span class="hljs-params">p,q</span>):<br>    wucha,wucha_predict = MA_prediction(data, q, <span class="hljs-number">0</span>)<br>    <span class="hljs-comment">#p_aicc,p_bic = p_finally(10)</span><br>    df0,df1 = AR_prediction(data,p,<span class="hljs-number">0</span>)<br>    result = df0[-<span class="hljs-built_in">len</span>(wucha):] - wucha<br>    <span class="hljs-keyword">return</span> result<br><br>result = ARMA(<span class="hljs-number">1</span>,<span class="hljs-number">6</span>)<br>plt.figure()<br>plt.plot(<span class="hljs-built_in">range</span>(<span class="hljs-number">60</span>),data[-<span class="hljs-number">60</span>:],c = <span class="hljs-string">&#x27;black&#x27;</span>)<br>plt.plot(<span class="hljs-built_in">range</span>(<span class="hljs-number">60</span>),result[-<span class="hljs-number">60</span>:],c=<span class="hljs-string">&#x27;red&#x27;</span>)<br>plt.show()<br><br><span class="hljs-built_in">print</span>(<span class="hljs-string">&#x27;mse:&#x27;</span>,mean_squared_error(result,data[-<span class="hljs-built_in">len</span>(result):]))<br><br></code></pre></td></tr></table></figure></div><hr><div><div class="post-metas my-3"><div class="post-meta mr-3 d-flex align-items-center"><i class="iconfont icon-category"></i> <span class="category-chains"><span class="category-chain"><a href="/categories/%E6%95%B0%E5%AD%A6%E5%BB%BA%E6%A8%A1/" class="category-chain-item">数学建模</a></span></span></div></div><div class="license-box my-3"><div class="license-title"><div>ARMA预测代码</div><div>https://jimes.cn/2024/09/11/ARMA预测/</div></div><div class="license-meta"><div class="license-meta-item"><div>作者</div><div>Jimes</div></div><div class="license-meta-item license-meta-date"><div>发布于</div><div>2024年9月11日</div></div><div class="license-meta-item"><div>许可协议</div><div><a class="print-no-link" target="_blank" href="https://creativecommons.org/licenses/by-nc-sa/4.0/"><span class="hint--top hint--rounded" aria-label="BY - 署名"><i class="iconfont icon-by"></i> </span></a><a class="print-no-link" target="_blank" href="https://creativecommons.org/licenses/by-nc-sa/4.0/"><span class="hint--top hint--rounded" aria-label="NC - 非商业性使用"><i class="iconfont icon-nc"></i> </span></a><a class="print-no-link" target="_blank" href="https://creativecommons.org/licenses/by-nc-sa/4.0/"><span class="hint--top hint--rounded" aria-label="SA - 相同方式共享"><i class="iconfont icon-sa"></i></span></a></div></div></div><div class="license-icon iconfont"></div></div><div class="post-prevnext my-3"><article class="post-prev col-6"><a hr
